name: Student project security review
about: Use this form to request or track an application security review for an internet-connected hardware project.
title: "Security review: "
labels: ["security-review", "student-project"]
body:
  - type: input
    id: project_name
    attributes:
      label: Project name
      placeholder: Project or device name
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Project summary
      description: Briefly describe what the device does and why it needs internet connectivity.
    validations:
      required: true
  - type: dropdown
    id: risk_level
    attributes:
      label: Preliminary risk level
      options:
        - Low
        - Medium
        - High
        - Unsure
    validations:
      required: true
  - type: checkboxes
    id: exposure
    attributes:
      label: Connectivity and exposure
      options:
        - label: Device uses Wi-Fi, Ethernet, cellular, Bluetooth gateway, LoRaWAN, MQTT, HTTP/API, WebSocket, or cloud dashboard.
        - label: Device is reachable from outside the local lab network.
        - label: Device uses outbound-only connectivity.
        - label: Device has an admin panel, dashboard, or API.
        - label: Device can receive remote commands.
        - label: Device can actuate, move, heat, pump, pressurize, cut, illuminate, fly, or otherwise affect the physical world.
  - type: checkboxes
    id: minimum_controls
    attributes:
      label: Minimum controls completed
      options:
        - label: Threat model drafted.
        - label: Network/data-flow diagram drafted.
        - label: No default or shared credentials.
        - label: No secrets committed to the repository.
        - label: Internet traffic uses TLS or equivalent encryption.
        - label: No unnecessary public inbound ports.
        - label: Remote commands are authenticated, authorized, logged, and safety-limited.
        - label: Dependency/security scan completed.
        - label: SECURITY.md and incident-response path reviewed.
  - type: textarea
    id: notes
    attributes:
      label: Notes, blockers, or requested review
      description: Include questions, known gaps, links to design docs, or items requiring faculty/PI review.
    validations:
      required: false

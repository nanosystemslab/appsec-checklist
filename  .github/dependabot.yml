version: 2
updates:
  # Keep GitHub Actions versions current.
  # If this repository later adds package manifests such as package.json,
  # requirements.txt, pyproject.toml, go.mod, Cargo.toml, or Dockerfiles,
  # add corresponding ecosystems here as appropriate.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "github-actions"
      - "security"
    commit-message:
      prefix: "deps"
      include: "scope"
    open-pull-requests-limit: 5
